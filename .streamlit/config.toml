# Tema global de ALDIMI Predict — modo oscuro azul para el dashboard.
# La UI nativa de Streamlit hereda estos valores.

[theme]
base = "dark"
primaryColor = "#3B82F6"             # azul principal (botones, sliders, acentos)
backgroundColor = "#0B1220"          # fondo principal
secondaryBackgroundColor = "#111B2E"  # sidebar, contenedores, inputs
textColor = "#F8FAFC"
font = "sans serif"
